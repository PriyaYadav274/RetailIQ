{% extends 'analytics/base.html' %}


{% block page_title %}
Dashboard
{% endblock %}

{% block content %}

<style>

/* KPI GRID */
.kpi-container{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:25px;
}

/* CHART GRID */
.chart-container{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
margin-bottom:25px;
}

/* BOTTOM GRID */
.bottom-container{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

/* CHART BOX */
.chart-box{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
transition:0.3s;
animation:fadeIn 0.6s ease;
}

.chart-box:hover{
transform:translateY(-5px);
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* KPI CARD */
.card h3{
margin:0;
font-size:16px;
color:#64748b;
}

.card p{
font-size:22px;
font-weight:bold;
margin-top:10px;
color:#0f172a;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

table th, table td{
padding:10px;
text-align:left;
border-bottom:1px solid #eee;
}

table tr:hover{
background:#f1f5f9;
}

/* ACTIVITY */
.activity ul{
list-style:none;
padding:0;
}

.activity li{
padding:10px;
border-bottom:1px solid #eee;
}

/* RESPONSIVE */
@media(max-width:900px){
.kpi-container{
grid-template-columns:repeat(2,1fr);
}

.chart-container,
.bottom-container{
grid-template-columns:1fr;
}
}

</style>

<!-- KPI -->
<div class="kpi-container">

<div class="card">
<h3>Total Revenue</h3>
<p>₹<span id="revenue"></span></p>
</div>

<div class="card">
<h3>Total Orders</h3>
<p><span id="orders"></span></p>
</div>

<div class="card">
<h3>Total Customers</h3>
<p><span id="customers"></span></p>
</div>

<div class="card">
<h3>Total Profit</h3>
<p>₹<span id="profit"></span></p>
</div>

</div>

<!-- CHARTS -->
<div class="chart-container">

<div class="chart-box">
<h3>Monthly Revenue Trend</h3>
<canvas id="revenueChart"></canvas>
</div>

<div class="chart-box">
<h3>Sales Distribution</h3>
<canvas id="salesPie"></canvas>
</div>

</div>

<!-- BOTTOM SECTION -->
<div class="bottom-container">

<div class="chart-box">
<h3>Top 5 Selling Products</h3>

<table id="topProductsTable">
<tr>
<th>Product</th>
<th>Sales</th>
</tr>
</table>

</div>

<div class="chart-box">
<h3>Top Insights</h3>
<ul id="insightsList"></ul>
</div>

</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

fetch('/dashboard-data/')
.then(res => res.json())
.then(data => {

    console.log("DATA:", data);

    // KPI
    document.getElementById("revenue").innerText = data.kpi.revenue;
    document.getElementById("orders").innerText = data.kpi.orders;
    document.getElementById("customers").innerText = data.kpi.customers;
    document.getElementById("profit").innerText = data.kpi.profit;

    // Monthly Chart
    const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

    const months = data.monthly.map(x => monthNames[x[0]-1]);
    const revenue = data.monthly.map(x => x[1]);

    new Chart(document.getElementById("revenueChart"),{
        type:"line",
        data:{
            labels:months,
            datasets:[{
                label:"Revenue",
                data:revenue,
                borderColor:"#3b82f6",
                backgroundColor:"rgba(59,130,246,0.1)",
                fill:true,
                tension:0.4
            }]
        },
        options:{
            plugins:{ legend:{display:false} },
            scales:{
                x:{
                    title:{
                        display:true,
                        text:"Months"
                    }
                },
                y:{
                    title:{
                        display:true,
                        text:"Revenue (₹)"
                    },
                    beginAtZero:true
                }
            }
        }
    });

    // Pie Chart
    const category = data.category.map(x => x[0] || "Others");
    const values = data.category.map(x => x[1]);

    if(category.length > 0){
        new Chart(document.getElementById("salesPie"),{
            type:"doughnut",
            data:{
                labels:category,
                datasets:[{
                    data:values,
                    backgroundColor:["#3b82f6","#10b981","#f59e0b","#ef4444"]
                }]
            },
            options:{
                plugins:{
                    legend:{
                        position:"bottom"
                    }
                }
            }
        });
    }

    // Top Products Table
    const table = document.getElementById("topProductsTable");

    data.top_products.forEach(item => {
        let row = table.insertRow();
        row.insertCell(0).innerText = item[0];
        row.insertCell(1).innerText = item[1];
    });

    // Insights
    const insights = document.getElementById("insightsList");

    // 🥇 Best Product
    if(data.top_products.length > 0){
        insights.innerHTML += `<li>🥇 Best Product: ${data.top_products[0][0]}</li>`;
    }

    // 📈 Highest Sales Month
    if(data.monthly.length > 0){
        let maxMonth = data.monthly.reduce((a,b) => a[1] > b[1] ? a : b);
        insights.innerHTML += `<li>📈 Highest Sales Month: ${maxMonth[0]}</li>`;
    }

    // 📉 Lowest Sales Month
    if(data.monthly.length > 0){
        let minMonth = data.monthly.reduce((a,b) => a[1] < b[1] ? a : b);
        insights.innerHTML += `<li>📉 Lowest Sales Month: ${minMonth[0]}</li>`;
    }

    // 📊 Top Category
    if(data.category.length > 0){
        let topCat = data.category.reduce((a,b) => a[1] > b[1] ? a : b);
        insights.innerHTML += `<li>📊 Top Category: ${topCat[0]}</li>`;
    }

    // 👥 Customer Strength
    if(data.kpi.customers > 1000){
        insights.innerHTML += `<li>👥 Strong Customer Base</li>`;
    } else {
        insights.innerHTML += `<li>👥 Growing Customer Base</li>`;
    }

    // 📊 Month-over-Month Growth
    if(data.monthly.length >= 2){
        let last = Number(data.monthly[data.monthly.length - 1][1]);
        let prev = Number(data.monthly[data.monthly.length - 2][1]);

        if(!isNaN(last) && !isNaN(prev) && prev !== 0){
            let growth = (((last - prev) / prev) * 100).toFixed(2);

            if(growth >= 0){
                insights.innerHTML += `<li>📊 Growth: Sales increased by ${growth}% from last month</li>`;
            } else {
                insights.innerHTML += `<li>📊 Growth: Sales decreased by ${Math.abs(growth)}% from last month</li>`;
            }
        }
    }


    // ⚠️ Sales Drop Alert (if drop > 20%)
    if(data.monthly.length >= 2){
        let last = Number(data.monthly[data.monthly.length - 1][1]);
        let prev = Number(data.monthly[data.monthly.length - 2][1]);

        if(!isNaN(last) && !isNaN(prev) && prev !== 0){
            let drop = ((prev - last) / prev) * 100;

            if(drop > 20){
                insights.innerHTML += `<li>⚠️ Alert: Sales dropped by ${drop.toFixed(2)}% recently</li>`;
            }
        }
    }


    // 💰 Average Order Value (AOV)
    if(data.kpi.orders > 0){
        let revenue = Number(data.kpi.revenue);

        if(!isNaN(revenue)){
            let aov = (revenue / data.kpi.orders).toFixed(2);
            insights.innerHTML += `<li>💰 Avg Order Value: ₹${aov}</li>`;
        }
    }

});

</script>

{% endblock %}
